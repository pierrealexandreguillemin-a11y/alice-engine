# V9 Training Final hyperparameters (2026-04-12)
# Hyperparameters Configuration - Alice-Engine ML Pipeline
# Version: 9.0.0
# Date: 12 Avril 2026
# Conformite: ISO/IEC 42001 (AI Management), ISO/IEC 5259 (Data Quality)
#
# DERIVATION: 590 configs, 13 kernels (Grid v2/v4, Optuna v4/v7/v8, Gaps R1/R2, Tier 2)
# Details: docs/project/V9_HP_SEARCH_RESULTS.md, config/MODEL_SPECS.md
# ADR: ADR-008 (alpha per-model), ADR-009 (recent season HP search), ADR-010 (ISO local)
#
# Sources:
# - https://catboost.ai/docs/concepts/parameter-tuning.html
# - https://xgboost.readthedocs.io/en/stable/tutorials/param_tuning.html
# - https://lightgbm.readthedocs.io/en/latest/Parameters-Tuning.html
# - Kull et al. 2019 (NeurIPS): Dirichlet calibration
# - AUTOMATA (NeurIPS 2022): HP search on subset transfers to full data

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global:
  random_seed: 42
  early_stopping_rounds: 200    # V9: 200 (was 500 V8). Sufficient at lr=0.05
  eval_metric: "multi_logloss"
  task_type: "CPU"              # Tree models — no GPU needed
  verbose: 500

# =============================================================================
# CATBOOST — Oblivious trees (symmetric, fixed structure)
# Alpha=0.3 (ADR-008): moderate sensitivity (0.0024), oblivious structure
# Tier 1 flags: score_function, border_count, leaf_estimation_iterations
# Source: catboost.ai/docs/concepts/parameter-tuning.html
# =============================================================================
catboost:
  init_score_alpha: 0.3         # ADR-008: oblivious trees, moderate sensitivity

  # Boosting
  iterations: 50000             # Early stopping decides actual count
  depth: 5                      # Gaps R1: 5>4>6>8 at alpha=0.3
  learning_rate: 0.05           # V9: all models lr=0.05 with ES=200
  loss_function: "MultiClass"

  # Regularization
  l2_leaf_reg: 8.0              # Grid v1: 8.0 optimal (was 10 V8)
  min_data_in_leaf: 200         # ZERO effect on oblivious trees but harmless
  random_strength: 2.0          # V9: reduced from 3 (Grid)
  rsm: 0.7                      # Grid v2: 0.7>0.45>0.3. MANDATORY >50 features

  # Tier 1 flags (CatBoost advanced — untested in HP search, test in Training Final)
  # score_function: GPU ONLY (catboost.ai/docs) — cannot use on CPU kernels
  border_count: 1024                      # More candidate splits (default CPU=254, max=65535)
  leaf_estimation_iterations: 3           # Better leaf value estimates (default=auto)

  # Infrastructure
  use_best_model: true
  early_stopping_rounds: 200
  thread_count: 4
  task_type: "CPU"              # rsm incompatible GPU (pairwise only)
  random_seed: 42
  verbose: 500

# =============================================================================
# XGBOOST — Depth-wise (level-by-level, robust to small gradients)
# Alpha=0.5 (ADR-008): quasi-indifferent (gap 0.001), compensates via iterations
# Tier 2 draw calibration: bynode=0.7 + gamma=1.0 + max_delta_step=1
# Source: xgboost.readthedocs.io/en/stable/parameter.html
# =============================================================================
xgboost:
  init_score_alpha: 0.5         # ADR-008: depth-wise, quasi-indifferent (0.001)

  # Boosting
  n_estimators: 50000
  max_depth: 6                  # Gaps R1: 6>4>8 at all alphas (NEW — was 4 V8)
  eta: 0.05                     # V9: all models lr=0.05
  objective: "multi:softprob"
  num_class: 3

  # Regularization
  lambda: 4.0                   # L2 (was 10 V8). Probst 2019: low tunability
  alpha: 0.01                   # L1 (was 0.5 V8). Probst 2019: quasi-nul
  min_child_weight: 50          # Grid + Gaps R2: confirmed optimal

  # Subsampling
  subsample: 0.8                # Grid v4 + Gaps R2: 0.8>0.7>0.6
  colsample_bytree: 1.0         # Grid v4: 1.0 optimal at low alpha

  # Tier 2 draw calibration (same logloss, draw_bias -22%, ECE draw -17%)
  colsample_bynode: 0.7         # Per-node feature sampling
  gamma: 1.0                    # Prevents noise splits
  max_delta_step: 1             # Limits leaf outputs, helps draw imbalance (13.7%)

  # Infrastructure
  tree_method: "hist"
  device: "cpu"
  nthread: 4
  seed: 42
  early_stopping_rounds: 200
  verbosity: 1

# =============================================================================
# LIGHTGBM — Leaf-wise (GOSS, best-first split)
# Alpha=0.1 (ADR-008): high sensitivity (0.054), GOSS drops small gradients
# Tier 2 confirmed: min_gain_to_split=0, lambda_l1=0 (defaults optimal)
# Source: lightgbm.readthedocs.io/en/latest/Parameters-Tuning.html
# =============================================================================
lightgbm:
  init_score_alpha: 0.1         # ADR-008: leaf-wise/GOSS, high sensitivity (0.054)

  # Boosting
  n_estimators: 50000
  num_leaves: 15                # Grid: 15 optimal (leaf-wise complexity param)
  max_depth: 8                  # Safety cap (was 4 V8)
  learning_rate: 0.05           # V9: all models lr=0.05
  objective: "multiclass"
  num_class: 3

  # Regularization
  reg_lambda: 4.0               # L2 (was 10 V8)
  min_child_samples: 275        # Official: "very important for leaf-wise". Gaps R1 optimal
  # min_gain_to_split: 0 (default — Tier 2 confirmed optimal)
  # reg_alpha: 0 (default — Tier 2 confirmed optimal)

  # Subsampling
  subsample: 0.8                # bagging_fraction
  subsample_freq: 1             # bagging_freq — MUST be >0 to activate bagging
  colsample_bytree: 1.0         # feature_fraction=1.0

  # Infrastructure
  n_jobs: 4
  random_state: 42
  early_stopping_rounds: 200
  verbose: -1

# =============================================================================
# STACKING META-LEARNER
# =============================================================================
stacking:
  meta_learner: "logistic_regression"

  logistic_regression:
    C: 1.0                      # Inverse regularization (defaut sklearn)
    max_iter: 1000
    random_state: 42

  ridge:
    alpha: 1.0

  selection:
    min_gain_vs_best_single: 0.01  # +1% AUC minimum pour choisir stacking

# =============================================================================
# OPTUNA HYPERPARAMETER SEARCH
# Documentation: https://optuna.org/
#
# JUSTIFICATIONS SEARCH SPACES:
# Basees sur:
# - Taille dataset ALICE: 1.1M echiquiers (large)
# - Nombre features: 12 (moderee)
# - Documentation officielle + Kaggle best practices
#
# MODIFICATIONS vs v1.0:
# - learning_rate: 0.1 -> 0.08 (0.1 trop agressif, instable)
# - iterations: ajoute 2000 pour LR faibles
# - Ajoute colsample_bytree, subsample (feature/row bagging)
# =============================================================================
optuna:
  n_trials: 100                 # Target trials (timeout may cut short)
  timeout: 36000                # 10h — 2h margin for post-processing + save

  # V9 SEARCH SPACES — 4 params per model
  #
  # METHODOLOGY:
  # v1 (2026-04-08): reduced 7-8 → 4 params based on fANOVA + literature
  # v2 (2026-04-10): revised after 5 kernels (3 Optuna + 2 Grid) + WebSearch
  # v3 (2026-04-11): HP search on saison=2022 only (~62K train + 71K valid)
  #     - Rationale: HP DIRECTIONS stable on subset (AUTOMATA, NeurIPS 2022)
  #     - ISO 5259-2: recent data = better representativeness for deployment
  #     - Training Final uses full dataset (2002-2022, 1.1M rows) with best params
  #     - Budget: XGB ~245 trials, LGB ~336 trials, CB ~85 trials in 10h
  #     - Grid comparison: 81 combos (3^4) on SAME data for cross-validation
  #
  # KEY CORRECTIONS (v2):
  # - Probst 2019 (JMLR): covers XGBoost ONLY, NOT CatBoost/LightGBM
  # - CatBoost min_data_in_leaf: ZERO effect on oblivious trees (grid confirmed)
  # - LightGBM bagging_fraction: 1.4% fANOVA (quasi-nul)
  #
  # SAMPLER: TPESampler(n_startup_trials=4, seed=42)
  # PRUNER: NopPruner (flat landscape, delta=0.009, MedianPruner pruned 17/18)
  #
  # Source: docs/superpowers/specs/2026-04-07-optuna-v9-pipeline-design.md §3

  shared:
    init_score_alpha:
      low: 0.5
      high: 0.8
      # XGBoost/CatBoost: [0.5, 0.8]. LightGBM overrides to [0.4, 0.8] in code
      # (best=0.504 at boundary, no LightGBM data below 0.5).
      # XGBoost data confirms alpha<0.5 is worse (trial 6: 0.33→0.5179).

  # --- XGBoost (VALIDATED: fANOVA v6 + 88 grid combos convergent) ---
  # TUNED: 4 params
  xgboost_search_space:
    subsample: {low: 0.6, high: 0.8}            # fANOVA 36.6% #1. Grid: 0.8>0.7>0.6. Optuna best=0.747
    colsample_bytree: {low: 0.5, high: 1.0}     # fANOVA 21.9% #3. Grid: 0.9>0.7>0.5. Optuna best=0.870
    min_child_weight: {low: 50, high: 200}       # fANOVA 25.8% #2. Grid: 50>100>200. Optuna best=67
  # FIXED: 4 params
  xgboost_fixed:
    max_depth: 8          # fANOVA 0%, 13 v6 trials all use 8
    eta: 0.05             # Coupled with early_stopping
    reg_lambda: 4.0       # Probst 2019 (valid for XGBoost): low tunability
    reg_alpha: 0.01       # Probst 2019 (valid for XGBoost): quasi-nul
    # Also fixed: n_estimators=50000, early_stopping=200, objective=multi:softprob

  # --- CatBoost (REVISED 2026-04-10: l2_leaf_reg replaces min_data_in_leaf) ---
  # TUNED: 4 params
  catboost_search_space:
    depth: {low: 4, high: 10}                    # Official: "optimal 4-10". Grid: 6>4>8>10
    rsm: {low: 0.2, high: 0.7}                   # MANDATORY >50 features. Grid mean: 0.7≈0.5>0.3
    l2_leaf_reg: {low: 1.0, high: 15.0}           # Official: "first params to tune". Tutorial [1,10], extended for depth≥8
  # FIXED: 3 params
  catboost_fixed:
    learning_rate: 0.05   # Coupled with early_stopping
    random_strength: 2.0  # CatBoost-specific, low priority
    min_data_in_leaf: 200  # ZERO effect on oblivious trees (grid: 3 values, identical logloss)
    # Also fixed: iterations=50000, early_stopping=200, loss=MultiClass, task_type=CPU

  # --- LightGBM (REVISED 2026-04-10: min_child_samples replaces bagging_fraction) ---
  # TUNED: 4 params (alpha overridden to [0.4, 0.8] in code)
  lightgbm_search_space:
    num_leaves: {low: 15, high: 255}             # Leaf-wise: THE complexity param, clamped 2^depth-1
    feature_fraction: {low: 0.3, high: 1.0}      # fANOVA 5.2% (van Rijn 2018: #5)
    min_child_samples: {low: 50, high: 500}       # Official: "very important for leaf-wise". [50,500] for 1.1M rows
  # FIXED: 4 params
  lightgbm_fixed:
    max_depth: 8          # Safety cap for leaf-wise growth
    learning_rate: 0.05   # Coupled with early_stopping
    reg_lambda: 4.0       # van Rijn 2018: moderate importance
    bagging_fraction: 0.8  # fANOVA 1.4% (quasi-nul), Optuna best=0.801, fixed near-optimal
    # Also fixed: n_estimators=50000, early_stopping=200, objective=multiclass, bagging_freq=1

# =============================================================================
# METRICS THRESHOLDS (ISO 25010 / 25059)
# Seuils multiclass 3-way: loss/draw/win (mise a jour Plan B v8)
# =============================================================================
metrics_thresholds:
  log_loss:
    maximum: 1.10               # Plafond: mieux que naive log(3)~1.099
    target: 0.95                # Objectif production
    excellent: 0.85             # Tres bon modele

  rps:
    maximum: 0.25               # Plafond RPS (ordinal-aware)
    target: 0.18                # Objectif production

  expected_score_mae:
    maximum: 0.40               # Plafond MAE score espere
    target: 0.30                # Objectif production

  ece:
    maximum: 0.05               # Plafond ECE par classe
    production_target: 0.015    # Cible post-calibration isotonique

  draw_calibration_bias:
    maximum: 0.02               # Biais max P(draw) predit vs observe

# =============================================================================
# MLFLOW TRACKING (ISO 42001 Tracabilite)
# =============================================================================
mlflow:
  experiment_name: "alice-ml-training"
  tracking_uri: "./mlruns"
  artifact_location: "./mlruns/artifacts"

  log_params: true
  log_metrics: true
  log_models: true
  log_feature_importance: true

# =============================================================================
# DRIFT MONITORING THRESHOLDS (ISO 5259 / 42001)
# Coherent avec scripts/model_registry/drift_dataclasses.py
# Source: https://www.evidentlyai.com/ml-in-production/data-drift
# =============================================================================
drift_thresholds:
  psi:
    warning: 0.1                # Changement modere
    critical: 0.25              # Changement significatif (action requise)
  accuracy_drop: 0.05           # 5% drop = alerte
  elo_shift: 50                 # 50 points ELO = alerte

# =============================================================================
# AUTOGLUON - AutoML Framework (ISO 42001)
# Documentation: https://auto.gluon.ai/stable/tutorials/tabular/
#
# JUSTIFICATIONS AUTOGLUON:
# - preset='extreme': Inclut TabPFN-2.5, tous les boosters, neural nets
# - time_limit=21600: 6 heures pour exploration complete (ISO 23894 risk mgmt)
# - num_bag_folds=5: Coherent avec K-Fold CV global
# - num_stack_levels=2: Multi-layer stacking optimal
#
# LIMITATIONS CONNUES (ISO 23894 - Risk Assessment):
# - RealTabPFN-v2: max_rows=10,000 (incompatible avec 1.1M samples)
# - TabDPT: max_rows=100,000 (incompatible avec 1.1M samples)
# - TabICL: max_rows=30,000 (incompatible avec 1.1M samples)
# - Mitra: max_rows=10,000 (incompatible avec 1.1M samples)
# Ces modeles seront exclus automatiquement par AutoGluon.
#
# Sources:
# - https://auto.gluon.ai/stable/api/autogluon.tabular.TabularPredictor.fit.html
# - https://priorlabs.ai/technical-reports/tabpfn-2-5-model-report
# =============================================================================
autogluon:
  # Presets: 'medium_quality', 'high_quality', 'best_quality', 'extreme'
  presets: "extreme"            # Inclut TabPFN-2.5 + tous modeles
  time_limit: 21600             # 6 HEURES (corrige de 3600)
  eval_metric: "log_loss"       # Multiclass 3-class: coherent avec pipeline

  # Stacking configuration
  num_bag_folds: 5              # K-Fold bagging (coherent global)
  num_stack_levels: 2           # 2 niveaux de stacking

  # Memory management (ISO 23894 - permet TabM avec 15GB RAM)
  ag_args_fit:
    ag.max_memory_usage_ratio: 1.5  # Permet 150% memoire pour modeles lourds

  # TabPFN configuration (Foundation Model)
  # NOTE: TabPFN sera skip automatiquement car dataset > 10K rows
  tabpfn:
    enabled: true               # Activer TabPFN-2.5
    n_ensemble_configurations: 16  # Nombre de configurations ensemble

  # Models a inclure explicitement
  # NOTE: Les modeles avec max_rows < 1.1M seront skipped automatiquement
  models:
    include:
      - TabPFN                  # Foundation model - SKIP si >10K rows
      - CatBoost                # Coherent avec baseline - OK
      - XGBoost                 # Coherent avec baseline - OK
      - LightGBM                # Coherent avec baseline - OK
      - NeuralNetFastAI         # Neural network - OK
      - RandomForest            # Ensemble trees - OK
      - ExtraTrees              # Extra randomized trees - OK

  # Reproducibilite
  random_seed: 42

  # Verbosity (0=silent, 1=info, 2=debug)
  verbosity: 2

# =============================================================================
# STATISTICAL COMPARISON - McNemar 5x2cv (ISO 24029/29119)
# Documentation: Dietterich (1998) - Approximate Statistical Tests
#
# JUSTIFICATIONS:
# - McNemar 5x2cv: Type I error acceptable, puissant pour classifieurs couteux
# - alpha=0.05: Seuil standard significativite statistique
# - bootstrap_samples=1000: Intervalles de confiance robustes
# - effect_size_threshold=0.05: 5% difference pratique minimale
#
# Sources:
# - Dietterich, T.G. (1998) NCBI
# - https://machinelearningmastery.com/mcnemars-test-for-machine-learning/
# =============================================================================
statistical_comparison:
  # Methode de comparaison
  method: "mcnemar_5x2cv"       # Dietterich 1998
  alpha: 0.05                   # Seuil significativite

  # Cross-validation
  n_splits: 5                   # 5 iterations x 2-fold

  # Bootstrap pour intervalles de confiance
  bootstrap_samples: 1000       # Nombre echantillons bootstrap

  # Taille d'effet minimale (pratique)
  effect_size_threshold: 0.05   # 5% difference = significatif pratiquement

  # Cohen's d interpretation
  cohens_d:
    small: 0.2
    medium: 0.5
    large: 0.8
